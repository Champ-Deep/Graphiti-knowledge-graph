# Nixpacks configuration for Railway
# This tells Railpack how to build and start the application

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn api_server:app --host 0.0.0.0 --port ${PORT:-8080}"

[variables]
PYTHON_VERSION = "3.11"
