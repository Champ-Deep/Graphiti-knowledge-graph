# Docker Compose for local development
# This mirrors the Railway deployment setup

version: '3.8'

services:
  # Neo4j Database
  neo4j:
    image: neo4j:5.26.2
    container_name: graphiti-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/graphiti-local-dev
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graphiti-network

  # Graphiti API
  graphiti-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphiti-api
    ports:
      - "8080:8080"
    environment:
      # Neo4j connection
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=graphiti-local-dev
      # LLM Configuration (override with .env or Railway env vars)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-your-key}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - MODEL_NAME=${MODEL_NAME:-anthropic/claude-sonnet-4}
      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - API_KEY=${API_KEY:-dev-api-key-change-in-production}
      # Team configuration
      - TEAM_DOMAINS=${TEAM_DOMAINS:-yourcompany.com}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - graphiti-network

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  graphiti-network:
    driver: bridge
