# Railway deployment configuration for Graphiti Knowledge Graph
# https://docs.railway.app/reference/config-as-code

[build]
# Use Nixpacks (Railway's default builder) instead of Dockerfile
# This is more reliable for Python projects on Railway
builder = "NIXPACKS"

[deploy]
# Start command - this is the most important part!
startCommand = "uvicorn api_server:app --host 0.0.0.0 --port ${PORT:-8080}"

# Health check configuration
healthcheckPath = "/health"
healthcheckTimeout = 30

# Resource configuration
numReplicas = 1

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
